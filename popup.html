<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMarkdown转换器</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 17V7C3 5.89543 3.89543 5 5 5H19C20.1046 5 21 5.89543 21 7V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M8 10L12 14L16 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>WebMarkdown</span>
            </div>
            <div class="version">v1.0</div>
        </header>

        <!-- 控制按钮区域 -->
        <div class="controls">
            <button id="convertBtn" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 4V16L12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 8L4 12L8 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                开始转换
            </button>
            
            <div class="options">
                <label class="checkbox-label">
                    <input type="checkbox" id="includeImages" checked>
                    <span class="checkmark"></span>
                    包含图片
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="includeLinks" checked>
                    <span class="checkmark"></span>
                    包含链接
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="includeBackgroundImages" checked>
                    <span class="checkmark"></span>
                    包含背景图片
                </label>
            </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-section">
            <div class="section-header">
                <h3>Markdown预览</h3>
                <div class="actions">
                    <button id="copyBtn" class="btn btn-secondary" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 4H20C21.1046 4 22 4.89543 22 6V20C22 21.1046 21.1046 22 20 22H6C4.89543 22 4 21.1046 4 20V16" stroke="currentColor" stroke-width="2"/>
                            <path d="M18 2H4C2.89543 2 2 2.89543 2 4V18C2 19.1046 2.89543 20 4 20H18C19.1046 20 20 19.1046 20 18V4C20 2.89543 19.1046 2 18 2Z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        复制
                    </button>
                    <button id="downloadBtn" class="btn btn-secondary" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V15" stroke="currentColor" stroke-width="2"/>
                            <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        下载
                    </button>
                </div>
            </div>
            
            <div class="preview-content">
                <div id="statusMessage" class="status-message">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <p>点击"开始转换"来提取页面内容</p>
                </div>
                
                <textarea id="markdownOutput" class="markdown-output" 
                         placeholder="转换后的Markdown内容将显示在这里..."></textarea>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="stats" id="statsSection" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">字符数:</span>
                <span id="charCount" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">行数:</span>
                <span id="lineCount" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">预计阅读:</span>
                <span id="readTime" class="stat-value">0分钟</span>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <p>正在转换中...</p>
        </div>
    </div>

    <script src="turndown.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
